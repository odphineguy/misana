<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiSana - Legal</title>
    <style>
        :root { --bg: #FAFAF9; --text: #1C1917; --muted: #57534E; --accent: #1169A0; --border: #E7E5E4; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1C1917; --text: #FAFAF9; --muted: #A8A29E; --accent: #4DA6D9; --border: #292524; } }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 3rem 1.5rem; max-width: 480px; margin: 0 auto; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: var(--muted); margin-bottom: 2rem; }
        a { display: block; padding: 0.75rem; margin-bottom: 0.75rem; border: 1px solid var(--border); border-radius: 8px; color: var(--accent); text-decoration: none; font-weight: 500; }
        a:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <h1>MiSana</h1>
    <p>Legal Documents</p>

    <a href="privacy-es.html">Politica de Privacidad (Espanol)</a>
    <a href="terms-en.html">Terms of Service (English)</a>
    <a href="terms-es.html">Terminos de Servicio (Espanol)</a>
</body>
</html>
